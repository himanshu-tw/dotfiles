[window]
padding = { x = 12, y = 10 }
decorations = "None"
opacity = 0.92
blur = true
startup_mode = "Maximized"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
size   = 13.0

[font.offset]
y = 2

[colors.primary]
background = "#0d1117"
foreground = "#e6edf3"

[colors.normal]
black   = "#21262d"
red     = "#ff7b72"
green   = "#3fb950"
yellow  = "#d29922"
blue    = "#58a6ff"
magenta = "#bc8cff"
cyan    = "#39c5cf"
white   = "#b1bac4"

[colors.bright]
black   = "#6e7681"
red     = "#ffa198"
green   = "#56d364"
yellow  = "#e3b341"
blue    = "#79c0ff"
magenta = "#d2a8ff"
cyan    = "#56d4dd"
white   = "#f0f6fc"

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500

[scrolling]
history = 10000

