format = """
[╭─](bold blue)$os$directory$git_branch$git_status$nodejs$python$rust$docker_context
[╰─](bold blue)$character"""

command_timeout = 1000

[os]
disabled = false
style = "bold blue"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "✦${count}"
untracked = "?${count}"
staged = "+${count}"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[cmd_duration]
min_time = 2000
format = " took [$duration](bold yellow)"
